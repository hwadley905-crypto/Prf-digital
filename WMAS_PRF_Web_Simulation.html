<script>
// Function to automatically expand a textarea to fit its content
function autoExpand(textarea) {
    textarea.style.height = 'auto'; // Reset the height
to set initial height to zero
    textarea.style.height = (textarea.scrollHeight) + 'px';
}

// Apply autoExpand to all existing textareas
const textareas = document.querySelectorAll('textarea');
textareas.forEach(textarea => {
    textarea.addEventListener('input', () => autoExpand(textarea));
    autoExpand(textarea); // Initial expansion on load
});

// Use MutationObserver to observe dynamically added textareas
const observer = new MutationObserver((mutations) => {
    mutations.forEach(mutation => {
        mutation.addedNodes.forEach(node => {
            if (node.nodeName === 'TEXTAREA') {
                node.addEventListener('input', () => autoExpand(node));
                autoExpand(node); // Initial expansion for new textarea
            } else if (node.querySelectorAll) {
                const newTextareas = node.querySelectorAll('textarea');
                newTextareas.forEach(newTextarea => {
                    newTextarea.addEventListener('input', () => autoExpand(newTextarea));
                    autoExpand(newTextarea);
                });
            }
        });
    });
});

// Start observing the document body for added nodes
observer.observe(document.body, { childList: true, subtree: true });
</script>
