<script>
// Auto-expand textareas
function autoExpandTextarea(textarea) {
    textarea.style.height = 'auto'; // Reset height
    textarea.style.height = textarea.scrollHeight + 'px'; // Set height based on content
}

// Initialize auto-expand for all existing textareas on page load
document.addEventListener('DOMContentLoaded', function () {
    const textareas = document.querySelectorAll('textarea');
    textareas.forEach(textarea => {
        autoExpandTextarea(textarea);
        textarea.addEventListener('input', () => autoExpandTextarea(textarea));
    });

    // Observe DOM changes for dynamically added textareas
    const observer = new MutationObserver(mutations => {
        mutations.forEach(mutation => {
            mutation.addedNodes.forEach(node => {
                if (node.nodeName === 'TEXTAREA') {
                    autoExpandTextarea(node);
                    node.addEventListener('input', () => autoExpandTextarea(node));
                } else if (node.querySelectorAll) {
                    const newTextareas = node.querySelectorAll('textarea');
                    newTextareas.forEach(newTextarea => {
                        autoExpandTextarea(newTextarea);
                        newTextarea.addEventListener('input', () => autoExpandTextarea(newTextarea));
                    });
                }
            });
        });
    });

    observer.observe(document.body, { childList: true, subtree: true });
});
</script>
