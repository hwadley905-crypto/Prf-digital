<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Simulation</title>
    <script>
        function previewImages() {
            const files = document.getElementById('imageUpload').files;
            const previewArea = document.getElementById('previewArea');
            previewArea.innerHTML = '';

            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imgElement = document.createElement('img');
                    imgElement.src = event.target.result;
                    imgElement.style.width = '100px';
                    imgElement.style.margin = '10px';
                    previewArea.appendChild(imgElement);
                };
                reader.readAsDataURL(files[i]);
            }
        }

        function addObsRow() {
            const obsTable = document.getElementById('obsTable');
            const newRow = obsTable.insertRow();
            newRow.innerHTML = '<td><input type="text" placeholder="Observation" /></td>';
        }

        function addInterventionRow() {
            const interTable = document.getElementById('interTable');
            const newRow = interTable.insertRow();
            newRow.innerHTML = '<td><input type="text" placeholder="Intervention" /></td>';
        }

        function addDrugRow() {
            const drugTable = document.getElementById('drugTable');
            const newRow = drugTable.insertRow();
            newRow.innerHTML = '<td><input type="text" placeholder="Drug Name" /></td>';
        }

        function setupSignatureCanvas() {
            const canvas = document.getElementById('signatureCanvas');
            const ctx = canvas.getContext('2d');
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 2;
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);

            let isDrawing = false;
            function startDrawing() {
                isDrawing = true;
                ctx.beginPath();
            }
            function draw(event) {
                if (!isDrawing) return;
                ctx.lineTo(event.clientX - canvas.offsetLeft, event.clientY - canvas.offsetTop);
                ctx.stroke();
            }
            function stopDrawing() {
                isDrawing = false;
                ctx.closePath();
            }
        }

        window.onload = setupSignatureCanvas;
    </script>
</head>
<body>
    <h1>Web Simulation</h1>
    <input type="file" id="imageUpload" accept="image/*" multiple onchange="previewImages()" />
    <div id="previewArea"></div>

    <h2>Observations</h2>
    <table id="obsTable">
        <tr><td><input type="text" placeholder="Observation" /></td></tr>
    </table>
    <button onclick="addObsRow()">Add Observation</button>

    <h2>Interventions</h2>
    <table id="interTable">
        <tr><td><input type="text" placeholder="Intervention" /></td></tr>
    </table>
    <button onclick="addInterventionRow()">Add Intervention</button>

    <h2>Drugs</h2>
    <table id="drugTable">
        <tr><td><input type="text" placeholder="Drug Name" /></td></tr>
    </table>
    <button onclick="addDrugRow()">Add Drug</button>

    <h2>Signature</h2>
    <canvas id="signatureCanvas" width="400" height="200" style="border: 1px solid #000;"></canvas>
</body>
</html>
