<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.json">
<title>WMAS Practice PRF</title>

<style>

/* ============================= */
/*   GITHUB DARK MODE DEFAULT    */
/* ============================= */

:root{
  --bg:#0d1117;
  --card-bg:#161b22;
  --text:#c9d1d9;
  --text-secondary:#8b949e;
  --primary:#0969da;
  --accent:#58a6ff;
  --border:#21262d;
  --divider:#21262d;
  --input-bg:#0d1117;

  --green:#238636;
  --amber:#bc8709;
  --red:#a93226;

  --sidebar-bg:#161b22;
  --sidebar-width:210px;
}

/* ============================= */
/* LIGHT MODE                    */
/* ============================= */

body.light{
  --bg:#f6f8fa;
  --card-bg:#ffffff;
  --text:#1f2937;
  --text-secondary:#6b7280;
  --primary:#2563eb;
  --accent:#0969da;
  --border:#d0d7de;
  --divider:#d0d7de;
  --input-bg:#ffffff;
  --green:#1a7f37;
  --amber:#9a6700;
  --red:#cf222e;
  --sidebar-bg:#f6f8fa;
}

/* ============================= */

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* HEADER */

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  background:var(--card-bg);
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  background:var(--primary);
  color:white;
  padding:8px 14px;
  border-radius:5px;
  font-weight:700;
}

h1{margin:0;font-size:18px;color:var(--accent);}

.layout{display:flex;min-height:calc(100vh - 53px);}

/* SIDEBAR */

.sidebar{
  width:var(--sidebar-width);
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  padding:10px 0;
}

.tab-btn{
  display:flex;
  width:calc(100% - 12px);
  margin:4px 6px;
  background:var(--tc);
  border:none;
  border-radius:6px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:700;
  color:#fff;
}

/* Muted Professional Colours */

.tab-btn[data-section="sec-clinician"]{--tc:#1f4f8b;}
.tab-btn[data-section="sec-callhistory"]{--tc:#3730a3;}
.tab-btn[data-section="sec-patient"]{--tc:#5b2d82;}
.tab-btn[data-section="sec-primary"]{--tc:#9f1239;}
.tab-btn[data-section="sec-gcs"]{--tc:#7f1d1d;}
.tab-btn[data-section="sec-secondary"]{--tc:#9a3412;}
.tab-btn[data-section="sec-obs"]{--tc:#854d0e;}
.tab-btn[data-section="sec-interventions"]{--tc:#3f6212;}
.tab-btn[data-section="sec-drugs"]{--tc:#166534;}
.tab-btn[data-section="sec-bodymap"]{--tc:#0f766e;}
.tab-btn[data-section="sec-atmist"]{--tc:#155e75;}
.tab-btn[data-section="sec-outcome"]{--tc:#1e3a8a;}
.tab-btn[data-section="sec-signoff"]{--tc:#475569;}

.content{flex:1;padding:24px;}

.section{
  background:var(--card-bg);
  padding:22px;
  border:1px solid var(--border);
  border-left:5px solid var(--primary);
  border-radius:8px;
  display:none;
}

.section.active-section{display:block;}

.section h2{
  margin:0 0 16px;
  border-bottom:1px solid var(--divider);
  padding-bottom:8px;
}

textarea,input,select{
  width:100%;
  padding:9px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--input-bg);
  color:var(--text);
  margin-bottom:10px;
}

button{
  background:var(--primary);
  color:white;
  border:none;
  padding:9px 14px;
  border-radius:6px;
  cursor:pointer;
}

/* PRINT MATCH MODE */

@media print{

  button,.sidebar{display:none!important;}

  body{
    background:var(--bg)!important;
    color:var(--text)!important;
  }

  .section{
    display:block!important;
    background:var(--card-bg)!important;
    border:1px solid var(--border)!important;
  }
}

</style>
</head>
<body>

<header>
  <div class="logo">PRF</div>
  <h1>Practice PRF</h1>
  <div>
    <button onclick="window.print()">Print / Save PDF</button>
    <button onclick="document.body.classList.toggle('light')">Toggle Mode</button>
  </div>
</header>

<div class="layout">

<nav class="sidebar">
  <button class="tab-btn active" data-section="sec-secondary">Secondary Survey</button>
  <button class="tab-btn" data-section="sec-obs">Patient Observations</button>
  <button class="tab-btn" data-section="sec-atmist">ATMIST</button>
</nav>

<main class="content">

<section class="section active-section" id="sec-secondary">
<h2>Secondary Survey</h2>
<textarea id="workingDiagnosis" placeholder="Working Diagnosis..."></textarea>
</section>

<section class="section" id="sec-obs">
<h2>Patient Observations</h2>
<button onclick="simulateNews2(3)">Low (3)</button>
<button onclick="simulateNews2(5)">Medium (5)</button>
<button onclick="simulateNews2(8)">High (8)</button>
<div id="news2Display" style="margin-top:15px;font-weight:bold;"></div>
</section>

<section class="section" id="sec-atmist">
<h2>ATMIST</h2>
<textarea id="atmistBox">Age
Time
Mechanism
Injuries
Signs
Treatment</textarea>
</section>

</main>
</div>

<script>

/* TAB SWITCH */

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active-section'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.section).classList.add('active-section');
  });
});

/* ========================= */
/* AUTOMATIC NEWS2 INJECTION */
/* ========================= */

function simulateNews2(score){

  document.getElementById("news2Display").innerText="NEWS2 Score: "+score;

  let risk="";
  if(score>=7) risk="HIGH";
  else if(score>=5) risk="MEDIUM";
  else risk="LOW";

  injectNews2(score,risk);
}

function injectNews2(score,risk){

  const timestamp=new Date().toLocaleString();

  const diagnosisBox=document.getElementById("workingDiagnosis");
  diagnosisBox.value += `\n\n[${timestamp}] NEWS2: ${score} (${risk} RISK)`;

  const atmist=document.getElementById("atmistBox");
  atmist.value += `\nNEWS2 ${score} (${risk})`;

  if(score>=7){
    diagnosisBox.value += `\nSepsis 6 Initiated:\n- Oxygen\n- IV Access\n- IV Fluids\n- Antibiotics\n- Lactate\n- Urine Output Monitoring\n`;
  }
}

/* ========================= */
/* PWA SERVICE WORKER REG    */
/* ========================= */

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
