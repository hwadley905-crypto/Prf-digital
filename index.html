<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Observations</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="sidebar" style="width: 120px;">
        <div class="tab" style="font-size: 11px;">Tab 1</div>
        <div class="tab" style="font-size: 11px;">Tab 2</div>
        <div class="tab" style="font-size: 11px;">Tab 3</div>
        <div class="tab" style="font-size: 11px;">Tab 4</div>
    </div>
    <div id="main-content">
        <div id="patient-details">
            <label for="patient-name">Patient Name:</label>
            <input type="text" id="patient-name" name="patient-name">
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob">
        </div>
        <table id="observation-table">
            <tr>
                <th>Resp Rate</th>
                <th>Pulse</th>
                <th>SpO2</th>
                <th>Temp</th>
                <th>Systolic BP</th>
                <th>Diastolic BP</th>
                <th>HR</th>
                <th>ETCO2</th>
                <th>ACVPU</th>
                <th>GCS</th>
                <th>Pupils</th>
            </tr>
            <tr>
                <td class="vital">...</td>
                <td class="vital">...</td>
                <td class="vital">...</td>
                <td class="vital">...</td>
                <td class="vital">...</td>
                <td class="vital">...</td>
                <td class="vital">...</td>
                <td class="vital">...</td>
                <td class="vital">...</td>
                <td class="vital">...</td>
                <td class="vital">...</td>
            </tr>
        </table>
        <div id="gcs-calculator-modal" class="modal">
            <form>
                <label for="eye">Eye Response:</label>
                <select id="eye" name="eye">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
                <label for="verbal">Verbal Response:</label>
                <select id="verbal" name="verbal">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
                <label for="motor">Motor Response:</label>
                <select id="motor" name="motor">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
                <button type="submit">Calculate GCS</button>
            </form>
        </div>
    </div>
</body>
</html>
